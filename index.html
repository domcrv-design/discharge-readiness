<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discharge readiness — unit pilot</title>
<style>
  :root{
    --bg:#F4F6F6;
    --surface:#FFFFFF;
    --ink:#141A1E;
    --ink-soft:#586069;
    --ink-faint:#8A9199;
    --line:#DEE3E5;
    --line-strong:#C7CDD0;
    --accent:#1F6F6B;
    --accent-ink:#0E4A47;
    --accent-tint:#E4F1EF;
    --risk-low-bg:#E8F3EA; --risk-low-ink:#276240;
    --risk-mod-bg:#FBF1DD; --risk-mod-ink:#8A5A0B;
    --risk-high-bg:#FCEADD; --risk-high-ink:#9A4713;
    --risk-vh-bg:#FBE4E3;  --risk-vh-ink:#932B29;
    --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:"SF Mono",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-ui);background:var(--bg);color:var(--ink);}
  .app{max-width:960px;margin:0 auto;padding:20px 16px 80px;}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:-0.01em;margin:0;}
  .brand .tag{font-size:12px;color:var(--ink-faint);border:1px solid var(--line);border-radius:20px;padding:2px 10px;}
  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px;}
  .tab{font-size:13px;font-weight:600;color:var(--ink-soft);padding:7px 14px;border-radius:8px;cursor:pointer;user-select:none;}
  .tab.active{background:var(--accent);color:#fff;}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
  .card h2{font-size:14px;font-weight:700;margin:0 0 12px;letter-spacing:0.01em;}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
  .metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .metric .lbl{font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
  .metric .val{font-size:24px;font-weight:700;font-family:var(--font-mono);letter-spacing:-0.01em;}
  .metric .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .status-banner{border-radius:10px;padding:11px 14px;font-size:13.5px;font-weight:600;margin-bottom:14px;}
  .btn{font-family:var(--font-ui);font-size:13px;font-weight:600;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);border-radius:8px;padding:8px 14px;cursor:pointer;}
  .btn:hover{background:var(--bg);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:var(--accent-ink);}
  .btn.small{padding:5px 10px;font-size:12px;}
  input[type=text], select, textarea{width:100%;font-family:var(--font-ui);font-size:13.5px;border:1px solid var(--line-strong);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink);}
  input[type=text]:focus, select:focus, textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  label.f{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.03em;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.03em;padding:6px 8px;border-bottom:1px solid var(--line);}
  td{padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .domain-bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
  .domain-bar-row:last-child{border-bottom:none;}
  .domain-name{width:190px;font-size:12.5px;font-weight:600;flex-shrink:0;}
  .domain-track{flex:1;height:8px;background:var(--bg);border-radius:6px;overflow:hidden;}
  .domain-fill{height:100%;border-radius:6px;}
  .domain-pct{width:46px;text-align:right;font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);flex-shrink:0;}
  .caselist-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .caselist-item:last-child{border-bottom:none;}
  .caselist-item:hover{background:var(--bg);}
  .caselist-left .id{font-weight:700;font-size:14px;}
  .caselist-left .meta{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:30px 10px;}
  .accordion{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;}
  .acc-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;background:var(--surface);}
  .acc-head:hover{background:var(--bg);}
  .acc-title{font-size:13.5px;font-weight:700;}
  .acc-badges{display:flex;gap:8px;align-items:center;}
  .acc-body{display:none;padding:0 14px 14px;background:var(--surface);}
  .accordion.open .acc-body{display:block;}
  .qrow{border-top:1px solid var(--line);padding:12px 0;}
  .qrow:first-child{border-top:none;}
  .qtext{font-size:13.5px;font-weight:600;margin-bottom:8px;}
  .qgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:8px;}
  .qresult{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px;font-size:12px;color:var(--ink-soft);}
  .caret{transition:transform 0.15s;color:var(--ink-faint);}
  .accordion.open .caret{transform:rotate(90deg);}
  .backlink{font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;margin-bottom:10px;display:inline-block;}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .warn-note{font-size:12px;color:var(--ink-faint);background:var(--bg);border-radius:8px;padding:8px 10px;margin-top:8px;}
  .newcase-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media (max-width:600px){
    .domain-name{width:120px;font-size:11.5px;}
    .newcase-form{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpMYqugyZZiwqzkCmABbeoXYnDNxquenM",
  authDomain: "discharge-readiness.firebaseapp.com",
  projectId: "discharge-readiness",
  storageBucket: "discharge-readiness.firebasestorage.app",
  messagingSenderId: "559026797221",
  appId: "1:559026797221:web:322ea7ac02bf5c14f86b4c"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const QUESTIONS = [
  {domain:"Medical Stability", q:"Are vital signs stable within an acceptable clinical range?", w:5, gate:true, barrier:"Medical instability", service:"Home nursing / clinical follow-up"},
  {domain:"Medical Stability", q:"Are acute symptoms stable or improving rather than worsening?", w:5, gate:true, barrier:"Worsening symptoms", service:"Clinical reassessment"},
  {domain:"Medical Stability", q:"Is pain controlled well enough for safe movement, sleep, and self-care at home?", w:4, gate:false, barrier:"Uncontrolled pain", service:"Medication review / follow-up"},
  {domain:"Medical Stability", q:"Are injury-specific red flags addressed before discharge?", w:4, gate:true, barrier:"Unresolved clinical red flag", service:"Clinical reassessment"},
  {domain:"Medical Stability", q:"Is the care plan clear for diet, activity restrictions, wound care, and warning signs?", w:2, gate:false, barrier:"Unclear care plan", service:"Discharge education / follow-up"},
  {domain:"Mobility & Falls", q:"Can the patient safely transfer in/out of bed and chair?", w:5, gate:true, barrier:"Unsafe transfers", service:"Personal support worker / physiotherapy"},
  {domain:"Mobility & Falls", q:"Can the patient walk the minimum distance required at home?", w:4, gate:true, barrier:"Unsafe walking", service:"Physiotherapy / mobility aid"},
  {domain:"Mobility & Falls", q:"Can the patient safely use stairs required to enter or function at home?", w:4, gate:true, barrier:"Unsafe stairs", service:"Physiotherapy / alternate setup"},
  {domain:"Mobility & Falls", q:"Is dizziness, balance, or orthostatic risk controlled?", w:3, gate:true, barrier:"Fall risk", service:"Clinical review / fall prevention"},
  {domain:"Mobility & Falls", q:"Has a recent fall or near-fall risk been assessed?", w:2, gate:false, barrier:"Fall history concern", service:"PT/OT assessment"},
  {domain:"Mobility & Falls", q:"Can the patient safely use required walker, cane, wheelchair, or brace?", w:2, gate:true, barrier:"Equipment use unsafe", service:"Equipment training / PT/OT"},
  {domain:"ADLs", q:"Can the patient safely toilet independently or with available help?", w:4, gate:true, barrier:"Toileting barrier", service:"Personal support worker"},
  {domain:"ADLs", q:"Can the patient bathe or wash safely with available help and equipment?", w:3, gate:false, barrier:"Bathing safety barrier", service:"Personal support worker / OT equipment"},
  {domain:"ADLs", q:"Can the patient dress and perform basic personal care?", w:3, gate:false, barrier:"Self-care barrier", service:"Personal support worker / caregiver"},
  {domain:"ADLs", q:"Can the patient safely eat, drink, and access meals?", w:2, gate:true, barrier:"Nutrition access barrier", service:"Meal support / caregiver"},
  {domain:"Cognition & Communication", q:"Is the patient alert, oriented, and free from concerning acute confusion?", w:4, gate:true, barrier:"Confusion/delirium risk", service:"Clinical review / caregiver supervision"},
  {domain:"Cognition & Communication", q:"Can the patient understand and follow discharge instructions?", w:3, gate:true, barrier:"Instruction comprehension barrier", service:"Education / caregiver training"},
  {domain:"Cognition & Communication", q:"Can the patient recognize warning signs and know who to contact?", w:3, gate:false, barrier:"Warning signs not understood", service:"Education / follow-up call"},
  {domain:"Cognition & Communication", q:"Are language, hearing, vision, literacy, or communication barriers addressed?", w:2, gate:false, barrier:"Communication barrier", service:"Interpreter/adapted instructions"},
  {domain:"Medication & Treatment", q:"Can the patient obtain all required medications before or immediately after discharge?", w:3, gate:true, barrier:"Medication access barrier", service:"Pharmacy / social work"},
  {domain:"Medication & Treatment", q:"Can the patient take medications correctly, including timing and dose?", w:4, gate:true, barrier:"Medication management barrier", service:"Pharmacy packaging / nursing"},
  {domain:"Medication & Treatment", q:"Can wound care, dressings, injections, oxygen, or other treatments be managed?", w:3, gate:true, barrier:"Treatment management barrier", service:"Home nursing"},
  {domain:"Medication & Treatment", q:"Are supplies, prescriptions, and equipment available before discharge?", w:2, gate:true, barrier:"Missing supplies/equipment", service:"DME / pharmacy / discharge planning"},
  {domain:"Home Environment", q:"Is the home layout compatible with current mobility limits?", w:4, gate:true, barrier:"Home layout barrier", service:"OT assessment / equipment / alternate setup"},
  {domain:"Home Environment", q:"Are bathroom, bedroom, entry, lighting, and trip hazards addressed?", w:3, gate:false, barrier:"Home safety barrier", service:"OT / home modification"},
  {domain:"Home Environment", q:"Is required equipment delivered and usable before discharge?", w:2, gate:true, barrier:"Equipment not available", service:"DME / discharge planning"},
  {domain:"Caregiver & Social Support", q:"Is a capable caregiver available when assistance is required?", w:4, gate:true, barrier:"Caregiver unavailable", service:"Home care / social work"},
  {domain:"Caregiver & Social Support", q:"Is the caregiver trained, willing, and able to provide required assistance?", w:2, gate:true, barrier:"Caregiver not prepared", service:"Caregiver training"},
  {domain:"Caregiver & Social Support", q:"Can the patient access food, hygiene, phone, emergency help, and basic needs?", w:2, gate:false, barrier:"Basic needs barrier", service:"Meal support / social work"},
  {domain:"Follow-up & Transportation", q:"Are follow-up appointments scheduled or clearly arranged?", w:2, gate:false, barrier:"Follow-up gap", service:"Discharge coordination"},
  {domain:"Follow-up & Transportation", q:"Is transportation arranged for home and follow-up care?", w:2, gate:false, barrier:"Transportation barrier", service:"Transportation service / caregiver"},
  {domain:"Patient Confidence", q:"Does the patient feel safe and prepared to go home?", w:2, gate:false, barrier:"Low confidence", service:"Education / supervised practice / follow-up"},
  {domain:"System Readiness", q:"Are all required services confirmed with provider, start date, and backup plan?", w:4, gate:true, barrier:"Services not confirmed", service:"Discharge planning"},
  {domain:"System Readiness", q:"Is there a documented escalation plan if symptoms worsen after discharge?", w:2, gate:false, barrier:"No escalation plan", service:"Follow-up call / discharge instructions"},
];

const DOMAIN_ORDER = ["Medical Stability","Mobility & Falls","ADLs","Cognition & Communication","Medication & Treatment","Home Environment","Caregiver & Social Support","Follow-up & Transportation","Patient Confidence","System Readiness"];

const RESPONSE_OPTS = ["Independent / no issue","Minor limitation","Needs some assistance","Needs frequent assistance","Unable / unsafe","Not applicable"];
const SEVERITY_OPTS = ["None","Low","Moderate","High","Critical"];
const AVAIL_OPTS = ["Confirmed","Available but not confirmed","Limited","Unavailable","Unknown"];
const STATUS_OPTS = ["Not required","Recommended","Requested","Confirmed","Unavailable"];

const ABILITY_SCORE = {"Independent / no issue":1,"Minor limitation":0.75,"Needs some assistance":0.5,"Needs frequent assistance":0.25,"Unable / unsafe":0,"Not applicable":null};
const SEVERITY_SCORE = {"None":0,"Low":1,"Moderate":2,"High":3,"Critical":4};
const AVAIL_SCORE = {"Confirmed":0,"Available but not confirmed":1,"Limited":2,"Unavailable":3,"Unknown":3};
const STATUS_SCORE = {"Not required":0,"Recommended":2,"Requested":2,"Confirmed":0,"Unavailable":4};

function defaultAnswer(){
  return {response:"Independent / no issue", severity:"None", support:"Confirmed", status:"Not required", mitigation:"", frequency:"", confirmed:"No"};
}

function computeRow(q, a){
  const intrinsic = a.response === "Not applicable" ? 0 : q.w * ABILITY_SCORE[a.response];
  const barrier = (a.severity==="High"||a.severity==="Critical"||a.response==="Unable / unsafe"||a.status==="Unavailable");
  const abilityComp = a.response==="Not applicable" ? 0 : Math.ceil((1-ABILITY_SCORE[a.response])*4);
  const serviceLevel = Math.min(5, Math.max(abilityComp, SEVERITY_SCORE[a.severity], AVAIL_SCORE[a.support], STATUS_SCORE[a.status]));
  let residual;
  if(!barrier && serviceLevel<=1) residual="Low";
  else if(a.severity==="Critical" || serviceLevel>=5) residual="Very High";
  else if(serviceLevel>=4) residual="High";
  else if(serviceLevel>=2) residual="Moderate";
  else residual="Low";
  let impact;
  if((q.gate && barrier) || residual==="Very High") impact="Blocks discharge until resolved";
  else if(residual==="High") impact="Requires confirmed mitigation before discharge";
  else if(residual==="Moderate") impact="Review/mitigate before discharge";
  else impact="Monitor";
  return {intrinsic, barrier, serviceLevel, residual, impact};
}

function computeCase(answers){
  const rows = QUESTIONS.map((q,i)=>({q, a:answers[i], r:computeRow(q, answers[i])}));
  const totalWeight = QUESTIONS.reduce((s,q)=>s+q.w,0);
  const totalIntrinsic = rows.reduce((s,x)=>s+x.r.intrinsic,0);
  const readiness = Math.round((totalIntrinsic/totalWeight)*1000)/10;
  const openBarriers = rows.filter(x=>x.r.barrier).length;
  const criticalGates = rows.filter(x=>x.q.gate && x.r.barrier).length;
  const maxService = rows.reduce((m,x)=>Math.max(m,x.r.serviceLevel),0);
  let status;
  if(criticalGates>0) status="Clinical review required — critical barrier present";
  else if(maxService>=5) status="Home discharge not currently supportable";
  else if(maxService>=4) status="Requires continuous/supervised support review";
  else if(maxService>=3) status="Conditional home readiness with frequent support";
  else if(readiness>=85) status="High readiness";
  else if(readiness>=70) status="Moderate readiness — resolve concerns";
  else status="Significant barriers";
  const domains = DOMAIN_ORDER.map(d=>{
    const drows = rows.filter(x=>x.q.domain===d);
    const wt = drows.reduce((s,x)=>s+x.q.w,0);
    const it = drows.reduce((s,x)=>s+x.r.intrinsic,0);
    const pct = wt===0? null : Math.round((it/wt)*1000)/10;
    const barriers = drows.filter(x=>x.r.barrier).length;
    const maxS = drows.reduce((m,x)=>Math.max(m,x.r.serviceLevel),0);
    return {domain:d, weight:wt, pct, barriers, maxService:maxS};
  });
  const barrierRows = rows.filter(x=>x.r.barrier).map(x=>({domain:x.q.domain, question:x.q.q, barrier:x.q.barrier, service:x.q.service, serviceLevel:x.r.serviceLevel, residual:x.r.residual, impact:x.r.impact}));
  barrierRows.sort((a,b)=>{
    const order = {"Blocks discharge until resolved":0,"Requires confirmed mitigation before discharge":1,"Review/mitigate before discharge":2,"Monitor":3};
    return (order[a.impact]-order[b.impact]) || (b.serviceLevel-a.serviceLevel);
  });
  return {rows, readiness, openBarriers, criticalGates, maxService, status, domains, barrierRows};
}

function riskPill(residual){
  const map = {"Low":["var(--risk-low-bg)","var(--risk-low-ink)"],"Moderate":["var(--risk-mod-bg)","var(--risk-mod-ink)"],"High":["var(--risk-high-bg)","var(--risk-high-ink)"],"Very High":["var(--risk-vh-bg)","var(--risk-vh-ink)"]};
  const c = map[residual] || map["Low"];
  return `<span class="pill" style="background:${c[0]};color:${c[1]}">${residual}</span>`;
}
function domainColor(pct){
  if(pct===null) return "var(--line)";
  if(pct>=85) return "#3E8F5E";
  if(pct>=70) return "#C99A2E";
  return "#C1560F";
}

let STATE = {view:"dashboard", cases:[], openCaseId:null, openAccordion:null, loading:true};

function startRealtimeSync(){
  const casesCol = collection(db, "cases");
  onSnapshot(casesCol, (snapshot)=>{
    const cases = [];
    snapshot.forEach(docSnap=>cases.push(docSnap.data()));
    cases.sort((a,b)=>b.updatedAt - a.updatedAt);
    STATE.cases = cases;
    STATE.loading = false;
    render();
  }, (err)=>{
    STATE.loading = false;
    STATE.syncError = err.message;
    render();
  });
}

async function saveCase(c){
  c.updatedAt = Date.now();
  const idx = STATE.cases.findIndex(x=>x.id===c.id);
  if(idx>=0) STATE.cases[idx]=c; else STATE.cases.unshift(c);
  STATE.cases.sort((a,b)=>b.updatedAt - a.updatedAt);
  await setDoc(doc(db, "cases", c.id), c);
}

function newCaseId(){
  return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s == null ? "" : s;
  return d.innerHTML;
}

function render(){
  const app = document.getElementById("app");
  if(STATE.loading){ app.innerHTML = `<div class="empty">Loading team board…</div>`; return; }
  if(STATE.syncError){ app.innerHTML = `<div class="empty">Could not connect to the shared database.<br>${escapeHtml(STATE.syncError)}<br>Check Firestore rules and config.</div>`; return; }
  let html = `
  <div class="topbar">
    <div class="brand"><h1>Discharge readiness</h1><span class="tag">Unit pilot · de-identified</span></div>
    <div class="tabs">
      <div class="tab ${STATE.view==='dashboard'?'active':''}" data-nav="dashboard">Team board</div>
      <div class="tab ${STATE.view==='cases'?'active':''}" data-nav="cases">Cases</div>
    </div>
  </div>`;
  if(STATE.view==="dashboard") html += renderDashboard();
  else if(STATE.view==="cases") html += renderCaseList();
  else if(STATE.view==="case") html += renderCaseDetail(STATE.openCaseId);
  app.innerHTML = html;
  bindEvents();
}

function getTeamSummary(){
  const active = STATE.cases.filter(c=>c.status!=="Discharged");
  const computed = active.map(c=>({c, comp:computeCase(c.answers)}));
  const blocked = computed.filter(x=>x.comp.criticalGates>0).length;
  const avgReadiness = computed.length ? Math.round(computed.reduce((s,x)=>s+x.comp.readiness,0)/computed.length*10)/10 : 0;
  const allBarriers = [];
  computed.forEach(x=>{
    x.comp.barrierRows.forEach(b=>allBarriers.push({...b, caseId:x.c.id, caseLabel:x.c.label}));
  });
  allBarriers.sort((a,b)=>{
    const order = {"Blocks discharge until resolved":0,"Requires confirmed mitigation before discharge":1,"Review/mitigate before discharge":2,"Monitor":3};
    return (order[a.impact]-order[b.impact]) || (b.serviceLevel-a.serviceLevel);
  });
  return {active, computed, blocked, avgReadiness, allBarriers};
}

function renderDashboard(){
  const {active, blocked, avgReadiness, allBarriers} = getTeamSummary();
  if(active.length===0){
    return `<div class="card"><div class="empty">No active cases yet. Open <b>Cases</b> to start one.</div></div>`;
  }
  let rows = allBarriers.slice(0,15).map(b=>`
    <tr>
      <td><a data-open-case="${b.caseId}" style="color:var(--accent);font-weight:600;cursor:pointer;">${escapeHtml(b.caseLabel)}</a></td>
      <td>${escapeHtml(b.domain)}</td>
      <td>${escapeHtml(b.barrier)}</td>
      <td>${escapeHtml(b.service)}</td>
      <td>${riskPill(b.residual)}</td>
      <td style="max-width:200px;">${escapeHtml(b.impact)}</td>
    </tr>`).join("");
  if(allBarriers.length===0){
    rows = `<tr><td colspan="6" class="empty">No open barriers across active cases.</td></tr>`;
  }
  return `
  <div class="metrics">
    <div class="metric"><div class="lbl">Active cases</div><div class="val">${active.length}</div></div>
    <div class="metric"><div class="lbl">Avg readiness</div><div class="val">${avgReadiness}%</div></div>
    <div class="metric"><div class="lbl">Blocked by critical gate</div><div class="val">${blocked}</div></div>
    <div class="metric"><div class="lbl">Open barriers, team-wide</div><div class="val">${allBarriers.length}</div></div>
  </div>
  <div class="card">
    <div class="toprow">
      <h2 style="margin:0;">Barrier board — all active cases, whole team</h2>
      <button class="btn small" id="emailTeamBtn">Email barrier board</button>
    </div>
    <table>
      <tr><th>Case</th><th>Domain</th><th>Barrier</th><th>Suggested service</th><th>Risk</th><th>Discharge impact</th></tr>
      ${rows}
    </table>
  </div>`;
}

function renderCaseList(){
  const rows = STATE.cases.map(c=>{
    const comp = computeCase(c.answers);
    return `<div class="caselist-item" data-open-case="${c.id}">
      <div class="caselist-left">
        <div class="id">${escapeHtml(c.label)} ${c.status==="Discharged"?'<span class="pill" style="background:var(--bg);color:var(--ink-faint);margin-left:6px;">Discharged</span>':''}</div>
        <div class="meta">Assessed by ${escapeHtml(c.assessor||"—")} · updated ${new Date(c.updatedAt).toLocaleString()}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-family:var(--font-mono);font-weight:700;font-size:15px;">${comp.readiness}%</div>
        <div style="font-size:11.5px;color:var(--ink-faint);">${comp.openBarriers} barrier${comp.openBarriers===1?'':'s'}${comp.criticalGates>0?' · critical gate':''}</div>
      </div>
    </div>`;
  }).join("");
  return `
  <div class="card">
    <div class="toprow"><h2 style="margin:0;">New assessment</h2></div>
    <div class="newcase-form">
      <div><label class="f">Case ID (bed / room, no patient name)</label><input type="text" id="newCaseLabel" placeholder="e.g. Bed 4B — Jul 9"></div>
      <div><label class="f">Assessed by (initials)</label><input type="text" id="newCaseAssessor" placeholder="e.g. J.T."></div>
    </div>
    <div class="warn-note">Do not enter patient names or other identifiers here — use a bed, room, or unit-issued case number.</div>
    <div style="margin-top:10px;"><button class="btn primary" id="createCaseBtn">Start assessment</button></div>
  </div>
  <div class="card">
    <h2>All cases (${STATE.cases.length})</h2>
    ${rows || '<div class="empty">No cases yet.</div>'}
  </div>`;
}

function renderCaseDetail(caseId){
  const c = STATE.cases.find(x=>x.id===caseId);
  if(!c) return `<div class="card"><div class="empty">Case not found.</div></div>`;
  const comp = computeCase(c.answers);
  const statusColor = comp.criticalGates>0 ? ["var(--risk-vh-bg)","var(--risk-vh-ink)"] : comp.maxService>=4 ? ["var(--risk-high-bg)","var(--risk-high-ink)"] : comp.readiness>=85 ? ["var(--risk-low-bg)","var(--risk-low-ink)"] : ["var(--risk-mod-bg)","var(--risk-mod-ink)"];

  let domainRows = comp.domains.map(d=>`
    <div class="domain-bar-row">
      <div class="domain-name">${escapeHtml(d.domain)}</div>
      <div class="domain-track"><div class="domain-fill" style="width:${d.pct===null?0:d.pct}%;background:${domainColor(d.pct)}"></div></div>
      <div class="domain-pct">${d.pct===null?'—':d.pct+'%'}</div>
    </div>`).join("");

  let accordions = DOMAIN_ORDER.map(dname=>{
    const idxs = [];
    QUESTIONS.forEach((q,i)=>{ if(q.domain===dname) idxs.push(i); });
    const domBarriers = idxs.filter(i=>comp.rows[i].r.barrier).length;
    const isOpen = STATE.openAccordion===dname;
    const qrows = idxs.map(i=>{
      const q = QUESTIONS[i], a = c.answers[i], r = comp.rows[i];
      return `
      <div class="qrow" data-qidx="${i}">
        <div class="qtext">${escapeHtml(q.q)} <span style="color:var(--ink-faint);font-weight:400;">(weight ${q.w}${q.gate?' · critical gate':''})</span></div>
        <div class="qgrid">
          <div><label class="f">Response</label><select data-field="response">${RESPONSE_OPTS.map(o=>`<option ${o===a.response?'selected':''}>${o}</option>`).join("")}</select></div>
          <div><label class="f">Severity</label><select data-field="severity">${SEVERITY_OPTS.map(o=>`<option ${o===a.severity?'selected':''}>${o}</option>`).join("")}</select></div>
          <div><label class="f">Support available</label><select data-field="support">${AVAIL_OPTS.map(o=>`<option ${o===a.support?'selected':''}>${o}</option>`).join("")}</select></div>
          <div><label class="f">Service status</label><select data-field="status">${STATUS_OPTS.map(o=>`<option ${o===a.status?'selected':''}>${o}</option>`).join("")}</select></div>
        </div>
        <div class="qgrid">
          <div style="grid-column:span 2;"><label class="f">Mitigation / service detail</label><input type="text" data-field="mitigation" value="${escapeHtml(a.mitigation)}" placeholder="${escapeHtml(q.service)}"></div>
          <div><label class="f">Frequency / intensity</label><input type="text" data-field="frequency" value="${escapeHtml(a.frequency)}" placeholder="e.g. 3x/week"></div>
          <div><label class="f">Confirmed?</label><select data-field="confirmed"><option ${a.confirmed==='No'?'selected':''}>No</option><option ${a.confirmed==='Partial'?'selected':''}>Partial</option><option ${a.confirmed==='Yes'?'selected':''}>Yes</option></select></div>
        </div>
        <div class="qresult">
          <span>Service level <b>${r.r.serviceLevel}</b></span>
          <span>${riskPill(r.r.residual)}</span>
          <span>${escapeHtml(r.r.impact)}</span>
        </div>
      </div>`;
    }).join("");
    return `
    <div class="accordion ${isOpen?'open':''}" data-domain="${dname}">
      <div class="acc-head" data-toggle-domain="${dname}">
        <div class="acc-title">${escapeHtml(dname)}</div>
        <div class="acc-badges">
          ${domBarriers>0?`<span class="pill" style="background:var(--risk-high-bg);color:var(--risk-high-ink);">${domBarriers} barrier${domBarriers===1?'':'s'}</span>`:''}
          <span class="caret">›</span>
        </div>
      </div>
      <div class="acc-body">${qrows}</div>
    </div>`;
  }).join("");

  return `
  <span class="backlink" data-nav="cases">← Back to cases</span>
  <div class="card">
    <div class="toprow">
      <div>
        <h2 style="font-size:17px;margin-bottom:4px;">${escapeHtml(c.label)}</h2>
        <div style="font-size:12px;color:var(--ink-faint);">Assessed by ${escapeHtml(c.assessor||"—")} · updated ${new Date(c.updatedAt).toLocaleString()}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn small" id="emailCaseBtn">Email summary</button>
        <button class="btn small" id="toggleDischarged">${c.status==="Discharged"?"Reopen case":"Mark discharged"}</button>
      </div>
    </div>
    <div class="status-banner" style="background:${statusColor[0]};color:${statusColor[1]};margin-top:12px;">${escapeHtml(comp.status)}</div>
    <div class="metrics">
      <div class="metric"><div class="lbl">Readiness</div><div class="val">${comp.readiness}%</div></div>
      <div class="metric"><div class="lbl">Open barriers</div><div class="val">${comp.openBarriers}</div></div>
      <div class="metric"><div class="lbl">Critical gates</div><div class="val">${comp.criticalGates}</div></div>
      <div class="metric"><div class="lbl">Max service level</div><div class="val">${comp.maxService}</div></div>
    </div>
  </div>
  <div class="card">
    <h2>Domain breakdown</h2>
    ${domainRows}
  </div>
  <div class="card">
    <h2>Assessment</h2>
    ${accordions}
  </div>`;
}

function openMailto(subject, body){
  window.location.href = "mailto:?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
}

function buildCaseEmailBody(c, comp){
  const lines = [];
  lines.push("Discharge readiness summary");
  lines.push("Case: "+c.label);
  lines.push("Assessed by: "+(c.assessor||"—"));
  lines.push("Updated: "+new Date(c.updatedAt).toLocaleString());
  lines.push("");
  lines.push("Status: "+comp.status);
  lines.push("Readiness: "+comp.readiness+"%");
  lines.push("Open barriers: "+comp.openBarriers);
  lines.push("Critical gates blocking discharge: "+comp.criticalGates);
  lines.push("Highest estimated service level: "+comp.maxService);
  lines.push("");
  lines.push("Domain breakdown:");
  comp.domains.forEach(d=>{
    lines.push("- "+d.domain+": "+(d.pct===null?"—":d.pct+"%")+" ("+d.barriers+" barrier(s), max service level "+d.maxService+")");
  });
  lines.push("");
  lines.push("Open barriers:");
  if(comp.barrierRows.length===0) lines.push("None");
  else comp.barrierRows.forEach(b=>{
    lines.push("- ["+b.domain+"] "+b.barrier+" — suggested: "+b.service+" — risk: "+b.residual+" — "+b.impact);
  });
  lines.push("");
  lines.push("Generated from the unit discharge readiness pilot tool. Not a validated diagnostic tool — professional judgement required.");
  return lines.join("\n");
}

function buildTeamEmailBody(){
  const {active, blocked, avgReadiness, allBarriers} = getTeamSummary();
  const lines = [];
  lines.push("Team barrier board — "+new Date().toLocaleString());
  lines.push("Active cases: "+active.length);
  lines.push("Avg readiness: "+avgReadiness+"%");
  lines.push("Cases blocked by critical gate: "+blocked);
  lines.push("");
  lines.push("Open barriers, highest priority first:");
  if(allBarriers.length===0) lines.push("None");
  else{
    const shown = allBarriers.slice(0,30);
    shown.forEach(b=>{
      lines.push("- ["+b.caseLabel+"] "+b.domain+": "+b.barrier+" — suggested: "+b.service+" — risk: "+b.residual+" — "+b.impact);
    });
    if(allBarriers.length>30) lines.push("+ "+(allBarriers.length-30)+" more not shown — open the app for the full list.");
  }
  lines.push("");
  lines.push("Generated from the unit discharge readiness pilot tool. Not a validated diagnostic tool — professional judgement required.");
  return lines.join("\n");
}

function bindEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.onclick = ()=>{ STATE.view = el.getAttribute("data-nav"); render(); };
  });
  document.querySelectorAll("[data-open-case]").forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); STATE.openCaseId = el.getAttribute("data-open-case"); STATE.view = "case"; STATE.openAccordion=null; render(); };
  });
  const createBtn = document.getElementById("createCaseBtn");
  if(createBtn){
    createBtn.onclick = async ()=>{
      const label = document.getElementById("newCaseLabel").value.trim();
      const assessor = document.getElementById("newCaseAssessor").value.trim();
      if(!label){ document.getElementById("newCaseLabel").focus(); return; }
      const c = {id:newCaseId(), label, assessor, status:"Active", createdAt:Date.now(), updatedAt:Date.now(), answers: QUESTIONS.map(()=>defaultAnswer())};
      createBtn.disabled = true; createBtn.textContent = "Creating…";
      await saveCase(c);
      STATE.openCaseId = c.id; STATE.view = "case"; STATE.openAccordion = DOMAIN_ORDER[0];
      render();
    };
  }
  document.querySelectorAll("[data-toggle-domain]").forEach(el=>{
    el.onclick = ()=>{
      const d = el.getAttribute("data-toggle-domain");
      STATE.openAccordion = STATE.openAccordion===d ? null : d;
      render();
    };
  });
  const emailCaseBtn = document.getElementById("emailCaseBtn");
  if(emailCaseBtn){
    emailCaseBtn.onclick = ()=>{
      const c = STATE.cases.find(x=>x.id===STATE.openCaseId);
      const comp = computeCase(c.answers);
      openMailto("Discharge readiness — "+c.label, buildCaseEmailBody(c, comp));
    };
  }
  const emailTeamBtn = document.getElementById("emailTeamBtn");
  if(emailTeamBtn){
    emailTeamBtn.onclick = ()=>{
      openMailto("Team barrier board — "+new Date().toLocaleDateString(), buildTeamEmailBody());
    };
  }
  const dischargedBtn = document.getElementById("toggleDischarged");
  if(dischargedBtn){
    dischargedBtn.onclick = async ()=>{
      const c = STATE.cases.find(x=>x.id===STATE.openCaseId);
      c.status = c.status==="Discharged" ? "Active" : "Discharged";
      await saveCase(c);
      render();
    };
  }
  document.querySelectorAll(".qrow").forEach(rowEl=>{
    const i = parseInt(rowEl.getAttribute("data-qidx"));
    rowEl.querySelectorAll("[data-field]").forEach(fieldEl=>{
      const field = fieldEl.getAttribute("data-field");
      fieldEl.onchange = async ()=>{
        const c = STATE.cases.find(x=>x.id===STATE.openCaseId);
        c.answers[i][field] = fieldEl.value;
        await saveCase(c);
        render();
      };
    });
  });
}

startRealtimeSync();
</script>
</body>
</html>
